<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <!-- v.86.0526: PWA manifest + icons (icon = launcher Capacitor, sesuai req kyai) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ammu Online" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Ammu Online — Pondok Pesantren Mambaul Ulum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
    <!-- v.20.74.0526: jsPDF + pdfmake DROPPED from initial load (now lazy-loaded by service when Rapor/AbsensiGuru opens).
         Savings: ~250 KB on every page load. Sentry tetap async defer. -->
    <script src="https://browser.sentry-cdn.com/7.119.0/bundle.tracing.min.js" crossorigin="anonymous" defer fetchpriority="low"></script>
    <script>
      // v.84.0526: Apply dark mode EARLY supaya splash gradient ikut tema user
      (function () {
        try {
          if (localStorage.getItem('portalMu_darkMode') === '1') {
            document.documentElement.classList.add('dark')
            document.addEventListener('DOMContentLoaded', function () {
              document.body && document.body.classList.add('dark-mode')
            })
          }
        } catch (e) {}
      })()
    </script>
    <style>
      /* v.85.0526: Splash pakai design asset Bakafrawi (portrait/landscape, light/dark).
         Background-image contain-fit + solid bg color sebagai fallback. */
      #splash-screen {
        position: fixed; inset: 0; z-index: 99999;
        background-color: #F2FEF9;
        background-image: url('/splash-portrait-light.png');
        background-repeat: no-repeat;
        background-position: center center;
        background-size: contain;
        opacity: 1; transition: opacity 0.4s ease-out;
        animation: splashFadeIn 0.4s ease-out both;
      }
      @media (orientation: landscape) {
        #splash-screen { background-image: url('/splash-landscape-light.png'); }
      }
      body.dark-mode #splash-screen, html.dark #splash-screen {
        background-color: #0F172A;
        background-image: url('/splash-portrait-dark.png');
      }
      @media (prefers-color-scheme: dark) and (orientation: portrait) {
        html.dark #splash-screen, body.dark-mode #splash-screen { background-image: url('/splash-portrait-dark.png'); }
      }
      @media (orientation: landscape) {
        body.dark-mode #splash-screen, html.dark #splash-screen { background-image: url('/splash-landscape-dark.png'); }
      }
      /* v.87.0526: fade-out pakai animation forwards supaya MENANG atas fill-mode 'both' splashFadeIn.
         (Bug lama: opacity:0 ke-override animasi fade-in yang fill both -> splash hilang mendadak tanpa fade.) */
      #splash-screen.fade-out { animation: splashFadeOut 0.5s ease-out forwards; pointer-events: none; }
      @keyframes splashFadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes splashFadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
      body.app-running #splash-screen { display: none !important; }
    </style>
  </head>
  <body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100">
    <!-- v.85.0526: Splash kosong — design (logo + Powered by Bakafrawi) sudah inline di bg-image -->
    <div id="splash-screen" aria-hidden="true"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
